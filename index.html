<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Grid FINAL</title>

<style>
body{
  margin:0;
  background:#070b10;
  font-family:monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#7CFFB2;
}

/* HUD */
#hud{
  width:340px;
  margin-top:10px;
  padding:10px;
  background:#0c121a;
  border:1px solid rgba(124,255,178,0.3);
}

.hud-row{
  display:flex;
  justify-content:space-between;
}

/* GAME FRAME */
#gameFrame{
  margin-top:10px;
  padding:10px;
  background:#05080c;
  border:1px solid rgba(124,255,178,0.4);
  position:relative;
}

canvas{
  display:block;
  background:#05080c;
}

/* GAME OVER */
#gameOver{
  position:absolute;
  top:10px;
  left:10px;
  width:300px;
  height:300px;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.85);
  border:1px solid rgba(255,80,80,0.5);
}

button{
  margin-top:10px;
  padding:8px;
  background:black;
  color:#7CFFB2;
  border:1px solid #7CFFB2;
}

/* CONTROLS */
#controls{
  margin-top:10px;
  position:relative;
  display:flex;
  justify-content:center;
}

.dpad{
  display:grid;
  grid-template-columns:50px 50px 50px;
  grid-template-rows:50px 50px 50px;
  gap:2px;
}

.dpad button{
  width:50px;
  height:50px;
  margin:0;
  padding:0;
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
}

.dpad button:active{
  background:#1a2a1a;
}

#pauseBtn{
  position:absolute;
  top:0;
  right:0;
  width:36px;
  height:36px;
  margin:0;
  padding:0;
  font-size:16px;
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
  background:black;
  color:#7CFFB2;
  border:1px solid #7CFFB2;
}

#pauseBtn:active{
  background:#1a2a1a;
}

/* PAUSE OVERLAY */
#pauseOverlay{
  position:absolute;
  top:10px;
  left:10px;
  width:300px;
  height:300px;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.85);
  border:1px solid rgba(124,255,178,0.5);
}
</style>
</head>

<body>

<div id="hud">
  <div class="hud-row">
    <div>NIVEL: <span id="level">1</span></div>
    <div>VIDAS: <span id="lives">❤️❤️❤️</span></div>
  </div>
  <div class="hud-row">
    <div>PUNTOS: <span id="score">0</span></div>
    <div>COMBO: <span id="combo">0</span></div>
  </div>
</div>

<div id="gameFrame">
<canvas id="game" width="320" height="320"></canvas>

<div id="gameOver">
  <h1 style="color:#FF4D4D">GAME OVER</h1>
  <p>Puntuación: <span id="finalScore">0</span></p>
  <button onclick="restart()">REINICIAR</button>
</div>

<div id="pauseOverlay">
  <h1 style="color:#7CFFB2">PAUSA</h1>
  <button onclick="togglePause()">REANUDAR</button>
</div>
</div>

<div id="controls">
  <div class="dpad">
    <div></div>
    <button data-dir="0,-1">▲</button>
    <div></div>
    <button data-dir="-1,0">◀</button>
    <button id="pulseBtn">⚡</button>
    <button data-dir="1,0">▶</button>
    <div></div>
    <button data-dir="0,1">▼</button>
    <div></div>
  </div>
  <button id="pauseBtn">⏸</button>
</div>

<script>

// ================= AUDIO =================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(f,d){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o.type="sine";
  o.frequency.value=f;

  o.connect(g);
  g.connect(audioCtx.destination);

  g.gain.value=0.05;

  o.start();
  o.stop(audioCtx.currentTime+d);
}

// ================= CANVAS =================
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const size=16;
const tile=20;

// ================= STATE =================
let player,nodes,glitches,waves;
let score,combo,lives,level;
let running=true;
let paused=false;
let flash=0;

// ================= INIT =================
function init(){
  player={x:8,y:8,dir:{x:1,y:0}};
  nodes=[];
  glitches=[];
  waves=[];

  score=0;
  combo=0;
  lives=3;
  level=1;
  running=true;

  generateNodes();
}

// ================= GENERATE =================
function generateNodes(){
  let count = 25 + level*5;

  for(let i=0;i<count;i++){
    nodes.push({
      x:rand(),
      y:rand(),
      active:false
    });
  }
}

function rand(){
  return Math.floor(Math.random()*size);
}

// ================= INPUT =================
window.addEventListener("keydown",(e)=>{

  if(!running) return;

  if(e.key==="Escape"||e.key==="p"){
    togglePause();
    return;
  }

  if(paused) return;

  if(e.key==="ArrowUp") setDir(0,-1);
  if(e.key==="ArrowDown") setDir(0,1);
  if(e.key==="ArrowLeft") setDir(-1,0);
  if(e.key==="ArrowRight") setDir(1,0);
  if(e.key===" ") turn();

});

function setDir(x,y){
  player.dir={x,y};
}

function turn(){
  let d=player.dir;
  player.dir={x:-d.y,y:d.x};
}

// ================= PAUSE =================
function togglePause(){
  if(!running) return;
  paused=!paused;
  document.getElementById("pauseOverlay").style.display=paused?"flex":"none";
  if(!paused) beep(600,0.05);
}

// ================= BUTTON CONTROLS =================
document.querySelectorAll("[data-dir]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    if(!running||paused) return;
    let [x,y]=btn.dataset.dir.split(",").map(Number);
    setDir(x,y);
  });
});

document.getElementById("pulseBtn").addEventListener("click",()=>{
  if(!running||paused) return;
  turn();
});

document.getElementById("pauseBtn").addEventListener("click",togglePause);

// ================= WAVE =================
function wave(x,y){
  waves.push({x,y,r:0,a:1});
}

// ================= LEVEL SYSTEM =================
function checkLevel(){

  let remaining = nodes.filter(n=>!n.active).length;

  if(remaining===0){
    nextLevel();
  }
}

function nextLevel(){

  level++;

  nodes=[];
  glitches=[];
  waves=[];

  generateNodes();

  if(lives<3) lives++;

  combo=0;

  flash=25;
  beep(800,0.2);
}

// ================= UPDATE =================
function update(){

  if(!running) return;
  if(paused){setTimeout(update,120);return;}

  player.x+=player.dir.x;
  player.y+=player.dir.y;

  if(player.x<0)player.x=size-1;
  if(player.x>=size)player.x=0;
  if(player.y<0)player.y=size-1;
  if(player.y>=size)player.y=0;

  // COLLECT
  nodes.forEach(n=>{
    if(!n.active && n.x===player.x && n.y===player.y){
      n.active=true;

      score+=10;
      combo++;

      beep(600,0.05);
      wave(n.x,n.y);
    }
  });

  // SPAWN GLITCH
  if(Math.random()<0.02){
    glitches.push({x:rand(),y:rand(),t:90});
  }

  // GLITCH LOGIC
  glitches.forEach((g,i)=>{

    g.t--;

    // PLAYER HIT
    if(g.x===player.x && g.y===player.y){
      lives--;
      combo=0;
      beep(120,0.2);
      g.t=0;
    }

    // WAVE HIT
    waves.forEach(w=>{
      let dx=(w.x-g.x)*tile;
      let dy=(w.y-g.y)*tile;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<18){
        g.t=0;
        beep(200,0.05);
      }
    });

    if(g.t<=0){
      glitches.splice(i,1);
    }
  });

  if(lives<=0){
    gameOver();
    return;
  }

  checkLevel();
  updateUI();

  let speed = Math.max(80, 220 - level * 15);
  setTimeout(update,speed);
}

// ================= DRAW =================
function draw(){

  ctx.fillStyle="rgba(5,8,12,0.6)";
  ctx.fillRect(0,0,320,320);

  if(flash>0){
    ctx.fillStyle="rgba(124,255,178,0.12)";
    ctx.fillRect(0,0,320,320);
    flash--;
  }

  // PLAYER
  ctx.fillStyle="#4DA6FF";
  ctx.fillRect(player.x*tile+5,player.y*tile+5,10,10);

  // NODES
  nodes.forEach(n=>{
    ctx.fillStyle=n.active?"#244d36":"#7CFFB2";
    ctx.fillRect(n.x*tile+8,n.y*tile+8,6,6);
  });

  // GLITCHES
  glitches.forEach(g=>{
    let blink=Math.sin(Date.now()*0.02)>0;
    ctx.fillStyle=blink?"#FF4D4D":"#660000";
    ctx.fillRect(g.x*tile+6,g.y*tile+6,8,8);
  });

  // WAVES
  waves.forEach((w,i)=>{
    ctx.strokeStyle="rgba(77,166,255,"+w.a+")";
    ctx.beginPath();
    ctx.arc(w.x*tile+10,w.y*tile+10,w.r,0,Math.PI*2);
    ctx.stroke();

    w.r+=2;
    w.a-=0.03;

    if(w.a<=0) waves.splice(i,1);
  });

  requestAnimationFrame(draw);
}

// ================= UI =================
function updateUI(){
  document.getElementById("score").innerText=score;
  document.getElementById("combo").innerText=combo;
  document.getElementById("lives").innerText="❤️".repeat(lives);
  document.getElementById("level").innerText=level;
}

// ================= GAME OVER =================
function gameOver(){
  running=false;
  paused=false;
  document.getElementById("pauseOverlay").style.display="none";
  document.getElementById("finalScore").innerText=score;
  document.getElementById("gameOver").style.display="flex";
}

// ================= RESTART =================
function restart(){
  document.getElementById("gameOver").style.display="none";
  init();
  update();
}

// ================= START =================
init();
update();
draw();

</script>

</body>
</html>
